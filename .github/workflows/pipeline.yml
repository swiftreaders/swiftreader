name: Run Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3
        with: 
          persist-credentials: false

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'  # Set the Node.js version compatible with your project

      # Switch to web-app directory
      # - name: Enter web-app
      #   working-directory: ./web-app
      #   run: cd web-app

      # Install dependencies
      - name: Install dependencies
        working-directory: ./web-app  
        run: npm install

      # Run Jest tests
      - name: Run tests
        working-directory: ./web-app
        run: npm test
